name: Archive done tasks

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archive-done-tasks
  cancel-in-progress: false

jobs:
  archive:
    # Avoid a second run when this workflow’s own push lands (nothing left to archive)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Move tasks with status done
        run: python scripts/archive-done-tasks.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No task files moved."
            exit 0
          fi
          git commit -m "chore: archive done tasks to tasks/done"
          git push
